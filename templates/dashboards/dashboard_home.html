{% extends 'base.html' %}

{% block content %}

<div class="row">
    {# Left side bar #}
    {% include 'dashboards/sidebar.html' %}
    {# right side content #}
    <div class="col-md-9">
         <span class="badge badge-primary">Logged in as: <b>{{ user.username }}</b></span>
        <div class="row">
           
            <div class="col">
                <div class="card border-deafult md-3">
                    <div class="card-header text-uppercase text-center font-weight-bold ">All Categories</div>
                    <div class="card-body text-dark">
                        <h5 class="card-title text-center">{{ category_counts }}</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card border-deafult md-3">
                    <div class="card-header text-uppercase text-center font-weight-bold ">All Posts</div>
                    <div class="card-body text-dark">
                        <h5 class="card-title text-center">{{ blog_counts }}</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

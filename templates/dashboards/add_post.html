{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row">
    {# Left side bar #}
    {% include 'dashboards/sidebar.html' %}
    {# right side content #}
    <div class="col-md-9">
        <h2>Add New Post</h2>
        <form action="{% url 'dashboards:add_post' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-warning">Add Post</button>
        </form>
        <br>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row">
    {# Left side bar #}
    {% include 'dashboards/sidebar.html' %}
    {# right side content #}
    <div class="col-md-9">
        <h2>Edit Blog Post</h2>
        {# <form action="{% url 'dashboards:edit_post' post.pk %}" method="post" enctype="multipart/form-data"> #}
        <form action="#" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Save Changes</button>
        </form>
        <br>
    </div>
</div>
{% endblock %}
